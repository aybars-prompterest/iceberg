services:
  app:
    image: ghcr.io/aybars-prompterest/iceberg:latest
    container_name: iceberg-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/blog.db
    volumes:
      - db_data:/data

  bot:
    image: ghcr.io/aybars-prompterest/iceberg-bot:latest
    container_name: iceberg-bot
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DATABASE_PATH=/data/blog.db
      - BOT_INTERVAL_HOURS=24
    volumes:
      - db_data:/data

volumes:
  db_data:
