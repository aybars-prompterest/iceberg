services:
  app:
    build: .
    container_name: iceberg-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/blog.db
    volumes:
      - db_data:/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: iceberg-bot
    env_file:
      - .env.production
    environment:
      - DATABASE_PATH=/data/blog.db
    volumes:
      - db_data:/data
    profiles:
      - bot

volumes:
  db_data:
